name: Build Android APK
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17
      - run: flutter create --platforms=android . --org com.mirzashop --project-name mirza_shop
      - name: Fix Android config
        run: |
          echo "org.gradle.jvmargs=-Xmx4096m" >> android/gradle.properties
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          sed -i 's|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-8.7-all.zip|' android/gradle/wrapper/gradle-wrapper.properties
          sed -i 's/com.android.application" version "[^"]*"/com.android.application" version "8.6.0"/' android/settings.gradle
          sed -i 's/com.android.library" version "[^"]*"/com.android.library" version "8.6.0"/' android/settings.gradle
          sed -i 's/org.jetbrains.kotlin.android" version "[^"]*"/org.jetbrains.kotlin.android" version "1.9.22"/' android/settings.gradle
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: APK
          path: build/app/outputs/flutter-apk/app-release.apk
